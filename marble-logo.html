<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble - Design Platform</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
        }
        .logo-container {
            margin-bottom: 30px;
            text-align: center;
        }
        .description {
            max-width: 600px;
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #495057;
            font-weight: 500;
            margin-top: 20px;
            font-size: 2.5em;
        }
        p {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <object data="marble-logo.svg" type="image/svg+xml" width="200" height="200"></object>
        <h1>marble</h1>
    </div>
    
    <div class="description">
        <p>A platform to discover and share designs for digital products.</p>
        <p>Like the natural stone, marble brings together many elements to create something beautiful.</p>
    </div>
</body>
</html>
